# Manos por Venezuela — static site, no build step.
# Netlify serves the repository root exactly as-is.

[build]
  publish = "."

# Sensible security headers for a static humanitarian site.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), camera=(), microphone=()"
